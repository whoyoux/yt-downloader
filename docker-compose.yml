services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: app-image
    container_name: app-container
    environment:
      NODE_ENV: production
      PORT: "3000"
      REDIS_URL: redis://redis:6379
      ADMIN_API_KEY: tajny_klucz
      NEXT_PUBLIC_SITE_URL: https://yt.whoyoux.com
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
volumes:
  redis_data:
